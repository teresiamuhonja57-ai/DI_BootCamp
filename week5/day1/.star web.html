<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars Character Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
    body {
    background-color: #222;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding-top: 50px;
}

.container {
    background: #333;
    padding: 2rem;
    border-radius: 10px;
    text-align: center;
    width: 400px;
}

.hidden { display: none; }

#find-character {
    background: #FFE81F; /* Star Wars Yellow */
    border: none;
    padding: 10px 20px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
}

.fa-spinner {
    font-size: 3rem;
    color: #FFE81F;
}
</style>
</head>
<body>

    <div class="container">
        <h1>Star Wars Character Info</h1>
        
        <div id="display-area">
            <div id="loading" class="hidden">
                <i class="fa-solid fa-spinner fa-spin-pulse"></i>
                <p>Loading...</p>
            </div>
            <div id="content">
                <p>Click the button to find a character!</p>
            </div>
        </div>

        <button id="find-character">FIND SOMEONE</button>
    </div>
    <script>
const API_KEY = 'YOUR_API_KEY'; // Replace with your actual key
const fromSelect = document.getElementById('from-currency');
const toSelect = document.getElementById('to-currency');
const amountInput = document.getElementById('amount');
const resultText = document.getElementById('conversion-text');
const switchBtn = document.getElementById('switch-btn');

// 1. Fetch supported currencies and populate selects
async function initCurrencies() {
    try {
        const response = await fetch(`https://v6.exchangerate-api.com/v6/${API_KEY}/codes`);
        const data = await response.json();
        
        const codes = data.supported_codes; // Returns array of [ ["USD", "United States Dollar"], ...]
        
        codes.forEach(([code, name]) => {
            const option1 = new Option(`${code} - ${name}`, code);
            const option2 = new Option(`${code} - ${name}`, code);
            fromSelect.add(option1);
            toSelect.add(option2);
        });

        // Set defaults
        fromSelect.value = "USD";
        toSelect.value = "EUR";
        
        calculate(); // Initial calculation
    } catch (err) {
        console.error("Initialization failed", err);
    }
}

// 2. Fetch pair conversion rate
async function calculate() {
    const from = fromSelect.value;
    const to = toSelect.value;
    const amount = amountInput.value;

    if (amount === "" || amount <= 0) return;

    try {
        const response = await fetch(`https://v6.exchangerate-api.com/v6/${API_KEY}/pair/${from}/${to}/${amount}`);
        const data = await response.json();
        
        if (data.result === "success") {
            const convertedAmount = data.conversion_result.toFixed(2);
            resultText.innerText = `${amount} ${from} = ${convertedAmount} ${to}`;
        }
    } catch (err) {
        resultText.innerText = "Error fetching conversion data.";
    }
}

// Bonus: Switch Button Logic
switchBtn.addEventListener('click', () => {
    const temp = fromSelect.value;
    fromSelect.value = toSelect.value;
    toSelect.value = temp;
    calculate();
});

// Event Listeners for automatic updates
[fromSelect, toSelect, amountInput].forEach(el => {
    el.addEventListener('change', calculate);
});
amountInput.addEventListener('input', calculate);

// Start the app
initCurrencies();
        const btn = document.getElementById('find-character');
const content = document.getElementById('content');
const loading = document.getElementById('loading');

async function getCharacter() {
    // Show loading, hide content/errors
    loading.classList.remove('hidden');
    content.innerHTML = '';

    try {
        // 1. Generate random ID (83 characters available)
        const randomID = Math.floor(Math.random() * 83) + 1;
        
        // 2. Fetch Character Data
        const response = await fetch(`https://www.swapi.tech/api/people/${randomID}`);
        const data = await response.json();
        
        if (data.message !== "result not found") {
            const char = data.result.properties;
            
            // 3. Fetch Homeworld Data (it's a separate URL in the properties)
            const homeworldRes = await fetch(char.homeworld);
            const homeworldData = await homeworldRes.json();
            const homeworldName = homeworldData.result.properties.name;

            // 4. Update DOM
            displayCharacter(char, homeworldName);
        } else {
            throw new Error("Character not found");
        }

    } catch (error) {
        content.innerHTML = `<p class="error">Oh no! That person isn't available.</p>`;
    } finally {
        loading.classList.add('hidden');
    }
}

function displayCharacter(char, planet) {
    content.innerHTML = `
        <h2>${char.name}</h2>
        <p><strong>Height:</strong> ${char.height}</p>
        <p><strong>Gender:</strong> ${char.gender}</p>
        <p><strong>Birth Year:</strong> ${char.birth_year}</p>
        <p><strong>Home World:</strong> ${planet}</p>
    `;
}

btn.addEventListener('click', getCharacter);
    </script>
</body>
</html>
