<form id="gifForm">
    <input type="text" id="category" placeholder="Search category..." required>
    <button type="submit">Fetch Gif</button>
</form>
<button id="deleteAll">DELETE ALL</button>
<div id="gifContainer"></div>
<script>
const gifForm = document.getElementById('gifForm');
const gifContainer = document.getElementById('gifContainer');
const deleteAllBtn = document.getElementById('deleteAll');
const apiKey = 'hpvZycW22qCjn5cRM1xtWB8NKq4dQ2My';

gifForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const query = document.getElementById('category').value;
    
    try {
        // Fetch a random gif based on category
        const response = await fetch(`https://api.giphy.com/v1/gifs/random?api_key=${apiKey}&tag=${query}`);
        const data = await response.json();
        const gifUrl = data.data.images.fixed_height.url;
        
        appendGif(gifUrl);
    } catch (err) {
        console.error("Error fetching GIF:", err);
    }
});

function appendGif(url) {
    const wrapper = document.createElement('div');
    wrapper.className = 'gif-wrapper';
    
    const img = document.createElement('img');
    img.src = url;
    
    const deleteBtn = document.createElement('button');
    deleteBtn.textContent = 'DELETE';
    deleteBtn.onclick = () => wrapper.remove();
    
    wrapper.append(img, deleteBtn);
    gifContainer.appendChild(wrapper);
}

deleteAllBtn.addEventListener('click', () => {
    gifContainer.innerHTML = '';
});
</script>
